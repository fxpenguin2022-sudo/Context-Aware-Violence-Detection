model:
  name: violence_skateformer_lite
  input_dim: 5
  d_model: 192
  depth: 6
  num_heads: 6
  mlp_ratio: 3.0
  dropout: 0.1
  attn_dropout: 0.1
  drop_path: 0.1
  use_grad_checkpoint: true

  acg:
    enabled: true
    init_tau: 0.35
    init_temp: 0.10
    learnable_tau: true
    learnable_temp: true

  interaction:
    enabled: true
    body_parts:
      - [5, 7, 9]
      - [6, 8, 10]
      - [11, 12, 5, 6]
      - [11, 13, 15]
      - [12, 14, 16]

  mil:
    topk_ratio: 0.25
    topk_beta: 0.6
    attn_temperature: 1.0

loss:
  name: bce
  pos_weight: 1.0
  focal_gamma: 0.0
  window_sparsity_weight: 0.0
