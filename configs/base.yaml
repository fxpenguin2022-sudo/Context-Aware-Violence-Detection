project:
  name: rwf2000_skeleton_mil
  seed: 3407
  deterministic: false

paths:
  pose_root: ./data/rwf2000_pose_hq
  video_root: ./data/rwf2000
  output_root: ./outputs/runs
  cache_root: ./outputs/cache
  index_file: ./outputs/cache/rwf2000_pose_index.jsonl

runtime:
  device: cuda
  use_amp: true
  amp_dtype: bf16
  compile_model: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high

logging:
  level: INFO
  log_interval: 20
  save_every_epochs: 1
  keep_last_k: 3
  progress_bar: true
  tensorboard: true
