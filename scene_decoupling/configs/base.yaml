project:
  name: rwf2000_scene_decoupling
  seed: 3407
  deterministic: false

paths:
  video_root: ./data/rwf2000
  pose_root: ./data/rwf2000_pose_hq
  output_root: ./scene_decoupling/outputs/runs
  cache_root: ./scene_decoupling/outputs/cache
  index_file: ./scene_decoupling/outputs/cache/rwf2000_scene_decoupling_index.jsonl

runtime:
  device: cuda
  use_amp: true
  amp_dtype: bf16
  allow_tf32: true
  matmul_precision: high
  cudnn_benchmark: true
  compile_model: false

logging:
  level: INFO
  log_interval: 20
  progress_bar: true
  pbar_postfix: true
  step_log_with_pbar: false
  tensorboard: true
  save_every_epochs: 1
