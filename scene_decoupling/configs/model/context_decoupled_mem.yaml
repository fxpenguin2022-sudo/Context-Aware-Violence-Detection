model:
  name: context_decoupled_mem

  backbone: memvit_official_k400_pretrained
  memvit_repo_path: ./third_party/MeMViT
  backbone_pretrained_path: ./checkpoints/MeMViT_16L_16x4_K400.pyth
  memvit_input_temporal: 16
  memvit_capture_blocks: [1, 3, 14]
  backbone_freeze_stages: 1
  proj_dim: 320

  num_heads: 8
  attn_layers_per_stream: 2
  mlp_ratio: 4.0
  attn_dropout: 0.1
  proj_dropout: 0.1

  mask:
    mode: skeleton   # skeleton | random | none
    align_strategy: max  # max | avg | conv
    enforce_complement: false  # if true, use bg = 1 - fg after downsampling

  decouple:
    mode: dual       # dual | action_only | scene_only | mixed

  memory:
    action_len: 24
    scene_len: 72
    action_pool: [4, 4]
    scene_pool: [1, 1]
    stop_grad_memory: true
    compression_mode: default  # default | all_high | all_low | reverse_mixed

  fusion:
    hidden_dim: 512
    dropout: 0.2

loss:
  name: bce_focal
  pos_weight: 1.0
  focal_gamma: 0.0
  label_smoothing: 0.03
  sep_weight: 0.0
  overlap_weight: 0.0
  fg_ratio_weight: 0.0
  fg_ratio_min: 0.0
  fg_ratio_max: 1.0
  constraint_warmup_epochs: 0
