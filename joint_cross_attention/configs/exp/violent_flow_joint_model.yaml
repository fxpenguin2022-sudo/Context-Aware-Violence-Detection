experiment:
  name: violent_flow_joint_model
  notes: "Joint SG-ACA + AMCF transfer to violent_flow using RWF-pretrained branches"
  tags: [joint_cross_attention, violent_flow, joint]

train:
  epochs: 20
  batch_size: 2
  eval_batch_size: 2
  grad_accum_steps: 4
  early_stop:
    enabled: true
    monitor: acc
    patience: 5
